name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: smd.exe
            asset_name: smd-windows-x64.exe
          - os: macos-latest
            artifact_name: smd
            asset_name: smd-macos-arm64
          - os: ubuntu-latest
            artifact_name: smd
            asset_name: smd-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Build executable
        shell: bash
        run: |
          poetry run pyinstaller \
            --onefile \
            --name smd \
            --console \
            --collect-all httpx \
            --collect-all typer \
            --collect-all rich \
            --collect-all pydantic \
            --hidden-import src.xiaohongshu \
            --hidden-import src.weibo \
            --hidden-import src.xiaohongshu.downloader \
            --hidden-import src.weibo.downloader \
            --hidden-import src.app \
            --hidden-import src.ui \
            --add-data "src:src" \
            ${{ matrix.os == 'windows-latest' && '--icon assets/icon.ico' || '' }} \
            entry.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/smd-windows-x64.exe/smd.exe
            artifacts/smd-macos-arm64/smd
            artifacts/smd-linux-x64/smd
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
