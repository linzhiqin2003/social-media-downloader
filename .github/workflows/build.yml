name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction
          poetry run pip install pyinstaller
      - name: Build
        shell: bash
        run: |
          poetry run pyinstaller \
            --onedir --windowed --name smd \
            --collect-all httpx --collect-all typer --collect-all rich \
            --collect-all pydantic --collect-all PyQt5 \
            --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui \
            --hidden-import PyQt5.QtWidgets --hidden-import PyQt5.sip \
            --hidden-import src.xiaohongshu --hidden-import src.weibo \
            --hidden-import src.xiaohongshu.downloader --hidden-import src.weibo.downloader \
            --hidden-import src.gui --hidden-import src.app --hidden-import src.ui \
            --add-data "src;src" --icon assets/icon.ico \
            entry.py
          cd dist && 7z a -tzip smd-windows-x64.zip smd/
      - uses: actions/upload-artifact@v4
        with:
          name: smd-windows-x64
          path: dist/smd-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction
          poetry run pip install pyinstaller
      - name: Build
        run: |
          poetry run pyinstaller \
            --onedir --windowed --name "Social Media Downloader" \
            --icon assets/icon.icns \
            --collect-all httpx --collect-all typer --collect-all rich \
            --collect-all pydantic --collect-all PyQt5 \
            --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui \
            --hidden-import PyQt5.QtWidgets --hidden-import PyQt5.sip \
            --hidden-import src.xiaohongshu --hidden-import src.weibo \
            --hidden-import src.xiaohongshu.downloader --hidden-import src.weibo.downloader \
            --hidden-import src.gui --hidden-import src.app --hidden-import src.ui \
            --add-data "src:src" \
            entry.py
          cd dist && zip -r "SocialMediaDownloader-macOS-arm64.zip" "Social Media Downloader.app"
      - uses: actions/upload-artifact@v4
        with:
          name: smd-macos-arm64
          path: dist/SocialMediaDownloader-macOS-arm64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction
          poetry run pip install pyinstaller
      - name: Build
        run: |
          poetry run pyinstaller \
            --onedir --name smd \
            --collect-all httpx --collect-all typer --collect-all rich \
            --collect-all pydantic --collect-all PyQt5 \
            --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui \
            --hidden-import PyQt5.QtWidgets --hidden-import PyQt5.sip \
            --hidden-import src.xiaohongshu --hidden-import src.weibo \
            --hidden-import src.xiaohongshu.downloader --hidden-import src.weibo.downloader \
            --hidden-import src.gui --hidden-import src.app --hidden-import src.ui \
            --add-data "src:src" \
            entry.py
          cd dist && tar czf smd-linux-x64.tar.gz smd/
      - uses: actions/upload-artifact@v4
        with:
          name: smd-linux-x64
          path: dist/smd-linux-x64.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/smd-windows-x64/smd-windows-x64.zip
            artifacts/smd-macos-arm64/SocialMediaDownloader-macOS-arm64.zip
            artifacts/smd-linux-x64/smd-linux-x64.tar.gz
          draft: false
          prerelease: false
