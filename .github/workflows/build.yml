name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction
          poetry run pip install pyinstaller
      - name: Build
        shell: bash
        run: |
          poetry run pyinstaller \
            --onefile --windowed --name smd \
            --collect-all httpx --collect-all typer --collect-all rich \
            --collect-all pydantic --collect-all PyQt5 \
            --hidden-import src.xiaohongshu --hidden-import src.weibo \
            --hidden-import src.xiaohongshu.downloader --hidden-import src.weibo.downloader \
            --hidden-import src.gui --hidden-import src.app --hidden-import src.ui \
            --add-data "src;src" --icon assets/icon.ico \
            entry.py
      - uses: actions/upload-artifact@v4
        with:
          name: smd-windows-x64
          path: dist/smd.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction
          poetry run pip install pyinstaller
      - name: Build
        run: |
          poetry run pyinstaller \
            --onedir --windowed --name "Social Media Downloader" \
            --collect-all httpx --collect-all typer --collect-all rich \
            --collect-all pydantic --collect-all PyQt5 \
            --hidden-import src.xiaohongshu --hidden-import src.weibo \
            --hidden-import src.xiaohongshu.downloader --hidden-import src.weibo.downloader \
            --hidden-import src.gui --hidden-import src.app --hidden-import src.ui \
            --add-data "src:src" \
            entry.py
          cd dist && zip -r "SocialMediaDownloader-macOS-arm64.zip" "Social Media Downloader.app"
      - uses: actions/upload-artifact@v4
        with:
          name: smd-macos-arm64
          path: dist/SocialMediaDownloader-macOS-arm64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction
          poetry run pip install pyinstaller
      - name: Build
        run: |
          poetry run pyinstaller \
            --onefile --name smd \
            --collect-all httpx --collect-all typer --collect-all rich \
            --collect-all pydantic --collect-all PyQt5 \
            --hidden-import src.xiaohongshu --hidden-import src.weibo \
            --hidden-import src.xiaohongshu.downloader --hidden-import src.weibo.downloader \
            --hidden-import src.gui --hidden-import src.app --hidden-import src.ui \
            --add-data "src:src" \
            entry.py
      - uses: actions/upload-artifact@v4
        with:
          name: smd-linux-x64
          path: dist/smd

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/smd-windows-x64/smd.exe
            artifacts/smd-macos-arm64/SocialMediaDownloader-macOS-arm64.zip
            artifacts/smd-linux-x64/smd
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
